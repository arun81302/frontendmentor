<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="src/output.css" />
  </head>
  <body class="font-[Outfit] min-h-screen flex justify-center items-center bg-[#0D1A2D] py-10">
    <div class="cotainer w-[80%]  bg-[#213146] rounded-2xl md:max-w-[40%] lg:max-w-[28%] xl:max-w-[23%] shadow-2xl shadow-black/30">
      <div class="inner w-[90%] mx-auto my-5">
        <div class="mainimage relative group">
          <img
            class="rounded-2xl w-full"
            src="images/image-equilibrium.jpg"
            alt="main image"
          />

          <div
            class="absolute inset-0 bg-cyan-400/50 rounded-2xl opacity-0 group-hover:opacity-100 hover:cursor-pointer flex justify-center items-center transition duration-300"
          >
            <img src="images/icon-view.svg" alt="view icon" />
          </div>
        </div>

        <h1
          class="my-3 font-semibold text-white hover:text-cyan-400 hover:cursor-pointer md:text-2xl"
        >
          Equilibrium #3429
        </h1>
        <p class="text-gray-100 font-light md:text-lg">Our Equilibrium collection promotes balance and calm.</p>

        <div class="balance border-b flex justify-between my-2 pb-5">
          <div class="crypto-icon flex self-center gap-1">
            <img
              class="size-8/12 self-center"
              src="images/icon-ethereum.svg"
              alt="etherum-icon"
            />
            <p class="text-cyan-400">0.01ETH</p>
          </div>
          <div class="clock flex gap-2">
            <img src="images/icon-clock.svg" alt="clock" />
            <p class="text-blue-800 whitespace-nowrap mr-1.5 text-md">
              3 days left
            </p>
          </div>
        </div>
        <div class="avatar flex items-center py-1 space-x-3">
          <img
            class="size-8 border-1 rounded-2xl border-amber-50"
            src="images/image-avatar.png"
            alt="avatar-image"
          />
          <p
            class="text-white font-light hover:text-cyan-400 hover:cursor-pointer"
          >
            <span class="text-blue-400">Creation of</span> Jules Wyvern
          </p>
        </div>
      </div>
    </div>
  </body>
</html>

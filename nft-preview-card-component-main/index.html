<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="src/output.css" />
  </head>
  <body class="h-screen flex justify-center items-center bg-[#0D1A2D]">
    <div class="cotainer w-[80%] border-2 bg-[#213146]">
      <div class="inner w-[90%] border-2 mx-auto my-5">
        <img src="images/image-equilibrium.jpg" alt="main image" />
        <h1 class="my-3 font-semibold text-white ">Equilibrium #3429</h1>
        <p>Our Equilibrium collection promotes balance and calm.</p>

        <div class="balance border-b border-green-500 flex justify-between my-2 pb-5 ">
          <div class="crypto-icon flex self-center gap-1 ">
            <img class="size-8/12 self-center " src="images/icon-ethereum.svg" alt="etherum-icon" />
            <p class="text-cyan-400">0.01ETH</p>
          </div>
          <div class="clock flex gap-2">
            <img src="images/icon-clock.svg" alt="clock" />
            <p class="text-blue-800 whitespace-nowrap mr-1.5 text-md">3 days left</p>
          </div>
        </div>
        <div class="avatar flex items-center py-5 space-x-3 ">
          <img class="size-8  border-1  rounded-2xl  border-amber-50 " src="images/image-avatar.png" alt="avatar-image" />
          <p><span class="text-blue-400">Creation of</span> Jules Wyvern</p>
        </div>
      </div>
    </div>
  </body>
</html>
